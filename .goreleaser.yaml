version: 2

project_name: pantalon

builds:
  - id: pantalon
    main: ./cmd/pantalon
    binary: pantalon
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: pantalon
    format: binary
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  groups:
    - title: Breaking Changes
      regexp: '^.*?(\([^)]+\))?!:'
      order: 0
    - title: Features
      regexp: '^feat(\([^)]+\))?:'
      order: 1
    - title: Bug Fixes
      regexp: '^fix(\([^)]+\))?:'
      order: 2
    - title: Documentation
      regexp: '^docs(\([^)]+\))?:'
      order: 3
    - title: Maintenance
      regexp: '^(chore|ci|refactor|test|build|perf|style)(\([^)]+\))?:'
      order: 4
    - title: Other
      order: 999
