name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    steps:
      - uses: googleapis/release-please-action@a02a34c4d625b9a4a861ad8d2a21165b37d93c22 # v4.2.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
