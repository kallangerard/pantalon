on:
  push: {}
  pull_request:
    branches:
      - main
  workflow_dispatch:

name: CI

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.0"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: go test -v ./...
